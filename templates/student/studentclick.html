<!DOCTYPE html>
{% load static %}
<html lang="en" dir="ltr">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

  <style media="screen">
   
body{
    margin:0;
    padding:0;
    font-family:'Poppins',sans-serif;
    background:linear-gradient(135deg,#0f172a,#2563eb,#06b6d4);
    min-height:100vh;
}

.jumbotron{
    width:70%;
    margin: 20px auto;
    padding:60px 40px;
    border-radius:25px;
    text-align:center;
    background:rgba(255,255,255,.12);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,.25);
    box-shadow:0 20px 45px rgba(0,0,0,.35);
    animation:fadeUp 1s ease;
}

.jumbotron h1{
    color:#fff;
    font-size:55px;
    font-weight:bold;
}

.jumbotron p{
    color:#e5e7eb;
    font-size:18px;
}

.btn{
    padding:14px 35px;
    border-radius:35px;
    border:none;
    font-size:18px;
    font-weight:600;
    transition:.7s;
    margin:10px;

    
}

.btn-primary{
    background:linear-gradient(45deg,#00c6ff,#0072ff);
    color:#fff;
    box-shadow:0 0 20px rgba(0,198,255,.5);

    
}

.btn-success{
    background:linear-gradient(45deg,#00c853,#64dd17);
    color:#fff;
    box-shadow:0 0 20px rgba(0,255,100,.4);
}

.btn:hover{
    transform:translateY(-3px) scale(1.05);
    box-shadow:0 15px 35px rgba(0,0,0,.4);

    
}

@keyframes fadeUp{
    from{
        opacity:0;
        transform:translateY(40px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.jumbotron{
    background:rgba(255,255,255,0.12) !important;
    backdrop-filter:blur(20px);
    -webkit-backdrop-filter:blur(20px);
    border:1px solid rgba(5, 98, 151, 0.562);
    border-radius:25px;
    box-shadow:0 15px 40px rgba(0,0,0,.35);
    color:white !important;
    padding:60px;
   
}

.jumbotron h1,
.jumbotron p,
.jumbotron hr{
    color:white !important;
}

hr{
    border-color:rgba(1, 3, 138, 0.808);
}
  </style>

</head>

<body>

  {% include "quiz/navbar.html" %}
  
  <div class="jumbotron" style="margin-bottom:0px;">
    <h1 class="display-4">Hello, Student</h1>
    <p class="lead">Welcome to Online Quiz</p>
    <hr class="my-4">
    <p>You can access various features after Login.</p>
    <p class="lead">
     <a href="/student/studentsignup" class="btn btn-success">
    Create Your Account
</a>

<a href="/student/studentlogin" class="btn btn-primary">
    Login
</a>
    </p>
    <br><br><br><br><br><br>
  </div>
 
  {% include "quiz/footer.html" %}
</body>

</html>
