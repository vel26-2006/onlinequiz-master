<!DOCTYPE html>
{% load static %}
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Student Dashboard</title>

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            background:#0f172a;
            overflow-x:hidden;
        }

        #check{
            display:none;
        }

       header{
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 70px;
    background: rgba(0,0,0,0.75);
    backdrop-filter: blur(12px);
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 25px;
    z-index: 1000;
}

.left_area{
    display:flex;
    align-items:center;
    gap:15px;
   
}

.right_area{
    display:flex;
    align-items:center;
    margin-left:auto;
     color: aliceblue;
}

.logout_btn{
   background:#19B3D3;
    color:#fff;
    padding:10px 22px;
    border-radius:8px;
    text-decoration:none;
    transition:.3s;
}

.content{
    margin-top: 100px;   /* Navbar height */
    margin-left: 250px;
    padding: 30px;
}

.left_area h3{
    color: #fff;
    font-weight: bold;
    font-size: 30px;
}


.logout_btn:hover{
    
      background:#0ea5e9;
    transform:translateY(-2px);
    box-shadow:0 0 15px rgba(14,165,233,.5);
}



        .sidebar{
            position:fixed;
            top:70px;
            left:0;
            width:250px;
            height:calc(100vh - 70px);
            background:#2f323a;
            padding-top:20px;
            transition:.3s;
            overflow-y:auto;
        }

        .sidebar center{
            margin-bottom:20px;
        }

        .profile_image{
            width:90px;
            height:90px;
            border-radius:50%;
        }

        .sidebar h4,
        .sidebar h6{
            color:#fff;
            margin-top:10px;
        }

        .sidebar a{
            display:block;
            color:#fff;
            text-decoration:none;
            padding:15px 25px;
        }

        .sidebar a:hover{
            background:#2563eb;
             transform:translateY(-2px);
              box-shadow:0 0 15px rgba(14,165,233,.5);
            color: white;
        }

        
        @media (max-width:768px){

        .sidebar{
            left:-250px;
        }

        #check:checked ~ .sidebar{
            left:0;
        }

        .content{
            margin-left:0;
            padding:20px;
        }

        .left_area h3{
            font-size:20px;
        }

        .logout_btn{
            padding:6px 12px;
            font-size:14px;
        }
    }

    #sidebar_btn{
     color: #fff;
    font-size: 26px;
    cursor: pointer;
    margin-right: 15px;
}

.right_area{
    margin-left:auto;
    display:flex;
    align-items:center;
}

.container{
   

     width:90%;
    max-width:1100px;   
    margin:40px auto;
    padding:35px;
    background:#fff;
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,.3);
}
@media (max-width:768px){

    .right_area{
        margin-left:auto;
    }

    .logout_btn{
        padding:6px 10px;
        font-size:12px;
    }
}

@media (min-width:769px){

    .sidebar{
        left:0;
    }

    .content{
        margin-left:250px;
    }

    #sidebar_btn{
        display:none;
    }
}

    </style>

</head>

<body>

<input type="checkbox" id="check">

<header>

    <div class="left_area">
        <label for="check">
            <i class="fas fa-bars" id="sidebar_btn"></i>
        </label>

        <h3>online quiz</h3>
    </div>

    <div class="right_area">
    <a href="/logout" class="logout_btn">Logout</a>
</div>
   

</header>

<div class="sidebar">

    <center>
        <img src="{% static 'image/student.png' %}" class="profile_image">

        <h4>{{ request.user.first_name }}</h4>
        <h6>( Student )</h6>
    </center>

    <a href="/student/student-dashboard">
        <i class="fas fa-home"></i> Dashboard
    </a>

    <a href="/student/student-exam">
        <i class="fas fa-book"></i> Exam
    </a>

    <a href="/student/student-marks">
        <i class="fas fa-chart-line"></i> Marks
    </a>

</div>

<div class="content">

    {% block content %}
    {% endblock content %}

    {% include "quiz/footer.html" %}

</div>

</body>
</html>
