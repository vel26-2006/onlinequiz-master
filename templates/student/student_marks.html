{% extends 'student/studentbase.html' %}
{% block content %}
{%load static%}

<head>
  <link href="//netdna.bootstrapcdn.com/bootstrap/3.0.0/css/bootstrap.min.css" rel="stylesheet" id="bootstrap-css">
  <script src="//netdna.bootstrapcdn.com/bootstrap/3.0.0/js/bootstrap.min.js"></script>
  <script src="//code.jquery.com/jquery-1.11.1.min.js"></script>

  <style media="screen">
    a:link {
      text-decoration: none;
    }

    h6 {
      text-align: center;
    }

    .row {
      margin: 100px;
    }

  

@keyframes pageLoad{
    from{
        opacity:0;
        transform:translateY(25px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}







 .container{
    
   
     max-width:1050px;
    margin:40px auto;
    background:transparent !important;
    box-shadow:none !important;
    border:none !important;
margin-top: 40px;
     animation: pageLoad .7s ease-out;
    will-change: transform, opacity;
}

.panel{
    background:rgba(13,20,45,.75);
    backdrop-filter:blur(15px);
    border-radius:25px;
    padding:25px;
    box-shadow:0 15px 35px rgba(0,0,0,.4);
    animation:fadeIn .8s ease;

   
    border: none;
    border-radius: 25px;

    /* Smooth Shadow */
    box-shadow:
        0 10px 30px rgba(0,0,0,.45),
        0 0 20px rgba(37,99,235,.30),
        inset 0 1px 1px rgba(255,255,255,.05);
}

.panel-heading{
    text-align:center;
    margin-bottom:20px;
}

.panel-title{
    color:#fff;
    font-size:42px;
    font-weight:700;
}

.table{
    width:100%;
    overflow:hidden;
    border-radius:18px;
    border-collapse:collapse;
}

.table thead{
    background:linear-gradient(90deg,#20d4ff,#2b7cff);
}

.table thead th{
    color:#fff;
    text-align:center;
    padding:18px;
    font-size:18px;
    font-weight:600;
}

.table tbody td{
    background:rgba(255,255,255,.08);
    color:#fff;
    text-align:center;
    padding:16px;
    border-top:1px solid rgba(255,255,255,.12);
    transition:.35s;
}

.table tbody tr:hover td{
    background:rgba(32,212,255,.18);
    transform:scale(1.01);
}

.table img{
    width:55px;
    height:55px;
    border-radius:50%;
    border:3px solid #27c8ff;
}

.btn-view{
    width:42px;
    height:42px;
    border-radius:50%;
    background:linear-gradient(135deg,#22d3ee,#2563eb);
    color:#fff;
    display:inline-flex;
    justify-content:center;
    align-items:center;
    transition:.35s;
}

.btn-view:hover{
    transform:scale(1.15);
    box-shadow:0 0 18px #22d3ee;
}



@media(max-width:768px){
    .container{
        width:95%;
        margin:20px auto;
    }

    .panel-title{
        font-size:28px;
    }

    .table thead th,
    .table td{
        padding:10px;
        font-size:14px;
    }
}



body{
    background:
        radial-gradient(circle at top left,#3b82f6 0%,transparent 35%),
        radial-gradient(circle at bottom right,#06b6d4 0%,transparent 35%),
        linear-gradient(135deg,#050b24 0%,#0f2d75 45%,#2563eb 100%);
    background-attachment:fixed;
    background-size:cover;
    background-repeat:no-repeat;
}

.sidebar{
    position: fixed;
    top: 70px;
    left: -250px;
    width: 250px;
    height: calc(100vh - 70px);

    background: rgba(10, 15, 25, 0.65);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);

    border-right: 1px solid rgba(255,255,255,0.08);
    box-shadow: 8px 0 25px rgba(0,0,0,0.45);

    transition: all .35s ease;
    z-index: 999;
}

.sidebar a{
    color:#fff;
    display:block;
    padding:16px 25px;
    transition:.3s;
}

.sidebar a:hover{
    background:rgba(37,99,235,.20);
    border-left:4px solid #3b82f6;
    color:#fff;
}

/* Desktop */
@media (min-width:769px){
    .sidebar{
        left:0 !important;
        transform:none !important;
        width:250px;
    }

    .main-content{
        margin-left:250px;
    }

    .menu-btn{
        display:none;
    }
}

/* Mobile */
@media (max-width:768px){
    .sidebar{
        left:-250px;
        transition:.3s;
    }

    .sidebar.active{
        left:0;
    }

    .main-content{
        margin-left:0;
    }

    .menu-btn{
        display:block;
    }
}


  </style>
</head>

<div class="container">
  <div class="panel panel-primary">
    <div class="panel-heading">
      <h6 class="panel-title">View Marks</h6>
    </div>
    <table class="table table-hover" id="dev-table">
      <thead>
        <tr>

          <th>Exam Name</th>
          
          <th>View Marks</th>
        </tr>
      </thead>
      {% for t in courses %}
      <tr>

        <td> {{t.course_name}}</td>
        
        <td><a class="btn btn-danger btn-xs" href="{% url 'check-marks' t.id  %}"><span class="glyphicon glyphicon-eye-open"></span></a></td>
      </tr>
      {% endfor %}
    </table>
  </div>
</div>



{% endblock content %}
