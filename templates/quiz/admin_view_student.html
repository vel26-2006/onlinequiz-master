{% extends 'quiz/adminbase.html' %}
{% block content %}
{%load static%}

<head>
 
 
  <script src="//code.jquery.com/jquery-1.11.1.min.js"></script>

  <style media="screen">
    a:link {
      text-decoration: none;
    }

    h6 {
      text-align: center;
    }
.container{
    width: 75%;
    max-width:1100px;
    margin:40px auto;
}

.panel{
    background:rgba(13,20,45,.75);
    backdrop-filter:blur(15px);
    border-radius:25px;
    padding:25px;
    box-shadow:0 15px 35px rgba(0,0,0,.4);
    animation:fadeIn .8s ease;
}

.panel-heading{
    text-align:center;
    margin-bottom:20px;
}

.panel-title{
    color:#fff;
    font-size:42px;
    font-weight:700;
}

.table{
    width:100%;
    overflow:hidden;
    border-radius:18px;
    border-collapse:collapse;
}

.table thead{
    background:linear-gradient(90deg,#20d4ff,#2b7cff);
}

.table thead th{
    color:#fff;
    text-align:center;
    padding:14px;
    font-size:18px;
    font-weight:600;
}

.table tbody td{
    background:rgba(255,255,255,.08);
    color:#fff;
    text-align:center;
    padding:12px 15px;
    border-top:1px solid rgba(255,255,255,.12);
    transition:.35s;
}

.table tbody tr:hover td{
    background:rgba(32,212,255,.18);
    transform:scale(1.01);
}

.table img{
    width:55px;
    height:55px;
    border-radius:50%;
    border:3px solid #27c8ff;
}

.btn-view{
    width:42px;
    height:42px;
    border-radius:50%;
    background:linear-gradient(135deg,#22d3ee,#2563eb);
    color:#fff;
    display:inline-flex;
    justify-content:center;
    align-items:center;
    transition:.35s;
}

.btn-view:hover{
    transform:scale(1.15);
    box-shadow:0 0 18px #22d3ee;
}
.card{
    background:rgba(15,23,42,.65);
    border-radius:20px;
    padding:25px;
    box-shadow:0 10px 30px rgba(0,0,0,.35);
}



.container{
    max-width:900px;
    margin:40px auto;
}

.panel{
    border-radius:20px;
    overflow:hidden;
    background:rgba(15,23,42,.75);
    box-shadow:0 10px 25px rgba(0,0,0,.4);
}

.panel-heading{
    padding:20px;
    text-align:center;
}

.table{
    margin-bottom:0;
    font-size:16px;
}

.table th,
.table td{
    text-align:center;
    padding:14px;
}

.panel-heading h4{
    font-size:32px;
    font-weight:bold;
    color:#fff;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(40px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}
  </style>
</head>

<div class="container">
  <div class="row">

    <div class="col-lg-8 col-md-10 mx-auto">


  <div class="panel panel-primary">
    <div class="panel-heading">
      <div class="student-card">
      <h4 class="text-center" style="text-align: center;">Students</h4>
    </div>

    <table class="table table-bordered table-hover text-center">
      </div>
      <thead>
       <tr>
    <th style="text-align:center;">Name</th>
    <th style="text-align:center;">Mobile</th>
    <th style="text-align:center;">Delete</th>
</tr>
      </thead>

     <tbody>
{% for t in students %}
<tr>
    <td>{{ t.get_name }}</td>
    <td>{{ t.mobile }}</td>
    <td>
    <a href="{% url 'delete-student' t.id %}" class="btn btn-danger">
        <i class="fa fa-trash"></i>
    </a>
</td>
</tr>
{% endfor %}
</tbody>
    </table>
  </div>

</div>
</div>
</div>

{% endblock content %}
