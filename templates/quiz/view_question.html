{% extends 'quiz/adminbase.html' %}
{% block content %}
{%load static%}

<head>
  <link href="//netdna.bootstrapcdn.com/bootstrap/3.0.0/css/bootstrap.min.css" rel="stylesheet" id="bootstrap-css">
  <script src="//netdna.bootstrapcdn.com/bootstrap/3.0.0/js/bootstrap.min.js"></script>
  <script src="//code.jquery.com/jquery-1.11.1.min.js"></script>

  <style media="screen">
    a:link {
      text-decoration: none;
    }

    h6 {
      text-align: center;
    }

    .row {
      margin: 100px;
    }

     .container{
    max-width:1100px;
    margin:40px auto;
}

.panel{
    background:rgba(13,20,45,.75);
    backdrop-filter:blur(15px);
    border-radius:25px;
    padding:25px;
    box-shadow:0 15px 35px rgba(0,0,0,.4);
    animation:fadeIn .8s ease;
}

.panel-heading{
    text-align:center;
    margin-bottom:20px;
}

.panel-title{
    color:#fff;
    font-size:42px;
    font-weight:700;
}

.table{
    width:100%;
    overflow:hidden;
    border-radius:18px;
    border-collapse:collapse;
}

.table thead{
    background:linear-gradient(90deg,#20d4ff,#2b7cff);
}

.table thead th{
    color:#fff;
    text-align:center;
    padding:18px;
    font-size:18px;
    font-weight:600;
}

.table tbody td{
    background:rgba(255,255,255,.08);
    color:#fff;
    text-align:center;
    padding:16px;
    border-top:1px solid rgba(255,255,255,.12);
    transition:.35s;
}

.table tbody tr:hover td{
    background:rgba(32,212,255,.18);
    transform:scale(1.01);
}

.table img{
    width:55px;
    height:55px;
    border-radius:50%;
    border:3px solid #27c8ff;
}

.btn-view{
    width:42px;
    height:42px;
    border-radius:50%;
    background:linear-gradient(135deg,#22d3ee,#2563eb);
    color:#fff;
    display:inline-flex;
    justify-content:center;
    align-items:center;
    transition:.35s;
}

.btn-view:hover{
    transform:scale(1.15);
    box-shadow:0 0 18px #22d3ee;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(40px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}
  </style>
</head>

<div class="container">
  <div class="panel panel-primary">
    <div class="panel-heading">
      <h6 class="panel-title">Questions</h6>
    </div>
    Course ID: {{ course.id }}
<br>
Course Name: {{ course.course_name}}
   
<a href="{% url 'delete-all-questions' course.id %}"
   class="btn btn-danger"
   onclick="return confirm('Delete all questions?')">
    Delete All Questions
</a>
    <table class="table table-hover" id="dev-table">
      </a>
      <thead>
        <tr>

          <th>Question</th>
         
          <th>Marks</th>
          
        </tr>
      </thead>

      
      {% for c in questions %}
      <tr>

        <td> {{c.question}}</td>
        
        <td>{{c.marks}}</td>
       <td>
   
</td>
      </tr>
      {% endfor %}
    </table>
  </div>
</div>


{% endblock content %}
