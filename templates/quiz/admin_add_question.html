{% extends 'quiz/adminbase.html' %}
{% load widget_tweaks %}
{% block content %}
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>
  <style>
       <meta name ="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
  <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>
  a:link {
        text-decoration: none;
      }
    
      .form-container,
.upload-box{
    width: 100%;
    max-width: 800px;
    margin: 40px auto;
}

form{
    width: 100%;
    margin: 0 auto !important;
}

.form-control{
    width: 100%;
    height: 45px;
}

.upload-btn{
    width: 220px !important;
    height: 50px;
    display: flex;
    justify-content: center;
    align-items: center;
    font-weight: bold;
    margin: 30px auto;
    border-radius: 30px;
    font-size: 18px;
}
  </style>
</head>
<h2 style="text-align:center; color:rgb(250, 250, 250);">ADD QUESTION</h2>
<div class="upload-box">

        <form method="POST" enctype="multipart/form-data" style="margin:100px;">

    {% csrf_token %}

    <div class="form-group">
        <label>Course</label>
       <input type="text"
       name="course_name"
       class="form-control"
       placeholder="Enter Course Name"
       required>

        <br>

        <label>Choose PDF</label>
        {% render_field questionForm.pdf class="form-control" %}
    </div>

    <br>

    <button type="submit" class="btn btn-primary upload-btn">
        Upload PDF
    </button>

</form>
</div>

{% endblock content %}
