<!DOCTYPE html>
{% load static %}
<html lang="en" dir="ltr">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  

  <style media="screen">
    a:link {
      text-decoration: none;
    }

    
    header {
      position: fixed;
      background: #22242A;
      padding: 20px;
      width: 100%;
      z-index: 1;
    }

    .left_area h3 {
      color: #fff;
      margin: 0px;
      text-transform: uppercase;
      font-size: 22px;
      font-weight: 900;
    }

    .left_area span {
      color: #19B3D3;
    }

    .logout_btn {
      padding: 5px;
      background: #19B3D3;
      text-decoration: none;
      float: right;
      margin-top: -30px;
      margin-right: 40px;
      border-radius: 2px;
      font-size: 15px;
      font-weight: 600;
      color: #fff;
      transition: 0.5s;

    }

    .logout_btn:hover {
      background: #0B87A6;
    }

    .sidebar {
      background: #2f323a;
      margin-top: 70px;
      padding-top: 30px;
      position: fixed;
      left: 0;
      width: 250px;
      height: 100%;
      transition: 0.5s;
      transition-property: left;
    }

    .sidebar .profile_image {
      width: 100px;
      height: 100px;
      border-radius: 100px;
      margin-bottom: 10px;
    }

    .sidebar h4 {
      color: #ccc;
      margin-top: 0;
      margin-bottom: 20px;
    }

    .sidebar a {
      color: #fff;
      display: block;
      width: 100%;
      line-height: 60px;
      text-decoration: none;
      padding-left: 40px;
      box-sizing: border-box;
      transition: 0.5s;

    }

    .sidebar a:hover {
      background: #19B3D3;
    }

    .sidebar i {
      padding-right: 10px;
    }

    label #sidebar_btn {
      z-index: 1;
      color: #fff;
      position: fixed;
      cursor: pointer;
      left: 300px;
      font-size: 20px;
      margin: 5px 0;
      transition: 0.5s;
      transition-property: color;
    }

    label #sidebar_btn:hover {
      color: #19B3D3;
    }

    #check:checked~.sidebar {
      left: -190px;
    }

    #check:checked~.sidebar a span {
      display: none;
    }

    #check:checked~.sidebar a {
      font-size: 20px;
      margin-left: 170px;
      width: 80px;
    }

    .content{
    margin-left:250px;
    min-height:100vh;
    width:calc(100% - 250px);
    overflow-x:hidden;
    transition: 0.5s;
}

    #check:checked~.content {
      margin-left: 60px;
    }

    #check {
      display: none;
    }

    @media (max-width:768px){

.sidebar{
    left:-250px;
    width:250px;
}

#check:checked ~ .sidebar{
    left:0;
}

.content{
    margin-left:0;
    padding:10px;
}

#check:checked ~ .content{
    margin-left:0;
}

label #sidebar_btn{
    left:20px;
}

.left_area h3{
    font-size:18px;
}

.logout_btn{
    margin-right:15px;
    font-size:12px;
    padding:5px 10px;
}

.sidebar a{
    font-size:16px;
}

.sidebar .profile_image{
    width:70px;
    height:70px;
}

}


/* Google Font */
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    margin: 0;
    padding: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg,#4facfe,#00f2fe,#43e97b);
    background-size: 400% 400%;
    animation: bgMove 10s ease infinite;
    min-height: 100vh;
}

@keyframes bgMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.quiz-container{
    width:100%;
    max-width:900px;
    
}
@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(30px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

h1{
    text-align:center;
    color:#fff;
    font-size:40px;
    margin-bottom:30px;
    text-shadow:2px 2px 10px rgba(0,0,0,.3);
}

.question{
    background:#fff;
    border-radius:20px;
    padding:25px;
    margin-bottom:25px;
    transition:.4s;
    animation:slideUp .8s ease;
}

.question:hover{
    transform:translateY(-5px);
    box-shadow:0 10px 30px rgba(0,0,0,.2);
}

.question h3{
    color:#333;
    margin-bottom:20px;
}

.option{
    display:block;
    background:#f3f5ff;
    padding:15px;
    border-radius:12px;
    margin-bottom:12px;
    cursor:pointer;
    transition:.3s;
    border:2px solid transparent;
}

.option:hover{
    background:#4facfe;
    color:#fff;
    border-color:#2196f3;
    transform:translateX(8px);
}

.option input{
    margin-right:10px;
    transform:scale(1.2);
}

button{
    width:100%;
    padding:18px;
    border:none;
    border-radius:50px;
    font-size:20px;
    font-weight:bold;
    color:#fff;
    cursor:pointer;
    background:linear-gradient(45deg,#ff512f,#dd2476);
    transition:.4s;
    position:relative;
    overflow:hidden;
}

button:hover{
    transform:scale(1.05);
    box-shadow:0 10px 25px rgba(0,0,0,.3);
}

button::before{
    content:'';
    position:absolute;
    top:0;
    left:-100%;
    width:100%;
    height:100%;
    background:rgba(255,255,255,.3);
    transition:.5s;
}

button:hover::before{
    left:100%;
}

.result{
    display:none;
    text-align:center;
    color:#fff;
    margin-top:25px;
    animation:zoom .8s;
}

@keyframes zoom{
    from{
        transform:scale(.5);
        opacity:0;
    }
    to{
        transform:scale(1);
        opacity:1;
    }
}

.progress{
    width:100%;
    height:12px;
    background:#ddd;
    border-radius:20px;
    overflow:hidden;
    margin-bottom:25px;
}

.progress-bar{
    height:100%;
    width:0%;
    background:linear-gradient(90deg,#00dbde,#fc00ff);
    animation:loadBar 2s forwards;
}

@keyframes loadBar{
    from{
        width:0;
    }
    to{
        width:100%;
    }
}

.card{
    background:white;
    padding:20px;
    border-radius:20px;
    box-shadow:0 15px 40px rgba(0,0,0,.15);
    transition:.4s;
}

.card:hover{
    transform:translateY(-8px) rotate(.5deg);
}

img{
    max-width:100%;
    border-radius:15px;
}

@media(max-width:768px){

.container{
    padding:20px;
}

h1{
    font-size:28px;
}

.question{
    padding:18px;
}

button{
    font-size:18px;
}

}

@media (max-width:768px){

.content{
    margin-left:0;
    width:100%;
    min-height:100vh;
    overflow-x:hidden;
    padding:15px;
}

body{
    overflow-x:hidden;
}

}

  </style>


  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.12.1/css/all.min.css">


</head>

<body>

  <input type="checkbox" id="check">
  <!--header area start-->
  <header>
    <label for="check">
      <i style="left: 200px;margin-top: 17px;"class="fas fa-bars" id="sidebar_btn"></i>
    </label>
    <div class="left_area">
      <h3>Online Quiz</h3>
    </div>
    <div class="right_area">
      <a href="/logout" class="logout_btn">Logout</a>
    </div>
  </header>
  <!--header area end-->
  <!--sidebar start-->
  <div class="sidebar">
    <center>

      <img src="{% static "image/admin.png" %}" class="profile_image" alt="">
      <h4>Admin</h4>

    </center>

    <a href="/admin-dashboard"><i class="fas fa-tachometer-alt"></i><span>Dashboard</span></a>
   
    <a href="/admin-student"><i class="fas fa-user-graduate"></i><span>Student</span></a>
    <a href="/admin-course"><i class="fas fa-book"></i><span>Courses</span></a>
    <a href="/admin-question"><i class="fas fa-question-circle"></i><span>Questions</span></a>
    


  </div>
  <!--sidebar end-->


  <!--content start-->
  <div class="content">
    <br><br><br><br><br>
    {% block content %}

    {% endblock content %}


    <br><br><br>
    {% include "quiz/footer.html" %}
  </div>
  <!--content end-->
</body>

</html>
