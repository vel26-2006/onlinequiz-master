<!DOCTYPE html>
{% load static %}
<html lang="en" dir="ltr">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  

  <style media="screen">
    a:link {
      text-decoration: none;
    }

    
    header {
      position:fixed;
    top:0;
    left:0;
    width:100%;
    height:70px;
    
    backdrop-filter:blur(12px);
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 20px;
    z-index:10000;
     background:rgba(15,23,42,.75);
    backdrop-filter:blur(20px);
    border-bottom:1px solid rgba(255,255,255,.1);
}
    

    .left_area h3 {
      color: #fff;
      margin: 0px;
      text-transform: uppercase;
      font-size: 22px;
      font-weight: 900;
    }

    .left_area span {
      color: #19B3D3;
    }

    .logout_btn {
      padding: 5px;
      background: #19B3D3;
      text-decoration: none;
      float: right;
      margin-top: -30px;
      margin-right: 40px;
      border-radius: 2px;
      font-size: 15px;
      font-weight: 600;
      color: #fff;
      transition: 0.5s;

    }

    .logout_btn:hover {
      background: #0B87A6;
    }

    .sidebar {
       position: fixed;
    top: 70px;
    left: 0;
    width: 250px;
    height: calc(100vh - 70px);
    
    z-index: 9999;
    transition: left .4s ease;
    background: rgba(0,0,0,0.45);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
}
    

    .sidebar .profile_image {
      width: 100px;
      height: 100px;
      border-radius: 100px;
      margin-bottom: 10px;
      border:3px solid #3b82f6;
    box-shadow:0 0 20px rgba(59,130,246,.5);
    }

    .sidebar h4 {
      color: #fff;
      margin-top: 0;
      margin-bottom: 20px;
    }

    .sidebar a {
      color: #fff;
      display: block;
      width: 100%;
      line-height: 60px;
      text-decoration: none;
      padding-left: 40px;
      box-sizing: border-box;
      transition: 0.5s;

    }

    .sidebar a:hover {
      
      transition: translatX(8px);
      box-shadow: 0 0 15px rgba(37,99,235,4);
         background:rgba(255,255,255,0.12);
    border-left:4px solid #3b82f6;
    color: rgb(133, 169, 223);
    }

    .sidebar i {
      padding-right: 10px;
    }

    label #sidebar_btn {
      z-index: 1;
      color: #fff;
      position: fixed;
      cursor: pointer;
      left: 300px;
      font-size: 20px;
      margin: 5px 0;
      transition: 0.5s;
      transition-property: color;
    }

    label #sidebar_btn:hover {
      color: #19B3D3;
    }

   

    
   

    .content{
        
       
       
    margin-left:250px;
    
    justify-content: center;
    align-items: flex-start;
    padding: 90px 30px 30px;
    background: transparent;
    color: #fff;
    min-height:100vh;
    width:calc(100% - 250px);
   position: relative;
   z-index: 1;
    overflow-x:hidden;
    transition:all 0.5s ease;
    animation:fadeln 0.8s ease;
}


    

    #check {
      display: none;
    }

    @media (max-width:768px){

.sidebar {
     left:0;
}
     


#check:checked ~ header label #sidebar_btn{
    left:20px;

    
}

   

.content{
        margin-left:0!important;
        margin-top: 70px;
        width: 100%;
        padding: 15px;
        transition: .3s;
}

#check:checked ~ .content{
    margin-left:0;
    width: 100%;
}

#check:checked ~ .sidebar{
    left:-250px;
}


label #sidebar_btn{
    left:20px;
}

.left_area h3{
    font-size:18px;
}

.logout_btn{
    margin-right:15px;
    font-size:12px;
    padding:5px 10px;
}

.sidebar a{
    font-size:16px;
}

.sidebar .profile_image{
    width:70px;
    height:70px;
}

}


/* Google Font */
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
        margin:0;
    padding:0;
    font-family:'Poppins',sans-serif;
    background:linear-gradient(135deg,#070c16,#153281,#5987e9);
    background-attachment:fixed;
    background-size:cover;
    min-height:100vh;
}



.quiz-container{
    width:100%;
    max-width:900px;
    
}
@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(30px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

h1{
    text-align:center;
    color:#fff;
    font-size:40px;
    margin-bottom:30px;
    text-shadow:2px 2px 10px rgba(0,0,0,.3);
}

.question{
    background:#fff;
    border-radius:20px;
    padding:25px;
    margin-bottom:25px;
    transition:.4s;
    animation:slideUp .8s ease;
}

.question:hover{
    transform:translateY(-5px);
    box-shadow:0 10px 30px rgba(0,0,0,.2);
}

.question h3{
    color:#333;
    margin-bottom:20px;
}

.option{
    display:block;
    background:#f3f5ff;
    padding:15px;
    border-radius:12px;
    margin-bottom:12px;
    cursor:pointer;
    transition:.3s;
    border:2px solid transparent;
}

.option:hover{
    background:#4facfe;
    color:#fff;
    border-color:#2196f3;
    transform:translateX(8px);
}

.option input{
    margin-right:10px;
    transform:scale(1.2);
}

.content button{
    width:100%;
    padding:18px;
    border:none;
    border-radius:50px;
    font-size:20px;
    font-weight:bold;
    color:#fff;
    cursor:pointer;
    background:linear-gradient(45deg,#ff512f,#dd2476);
    transition:.4s;
    position:relative;
    overflow:hidden;
}

button:hover{
    transform:scale(1.05);
    box-shadow:0 10px 25px rgba(0,0,0,.3);
}

button::before{
    content:'';
    position:absolute;
    top:0;
    left:-100%;
    width:100%;
    height:100%;
    background:rgba(255,255,255,.3);
    transition:.5s;
}

button:hover::before{
    left:100%;
}

.result{
    display:none;
    text-align:center;
    color:#fff;
    margin-top:25px;
    animation:zoom .8s;
}

@keyframes zoom{
    from{
        transform:scale(.5);
        opacity:0;
    }
    to{
        transform:scale(1);
        opacity:1;
    }
}

.progress{
    width:100%;
    height:12px;
    background:#ddd;
    border-radius:20px;
    overflow:hidden;
    margin-bottom:25px;
}

.progress-bar{
    height:100%;
    width:0%;
    background:linear-gradient(90deg,#00dbde,#fc00ff);
    animation:loadBar 2s forwards;
}

@keyframes loadBar{
    from{
        width:0;
    }
    to{
        width:100%;
    }
}

.card{
    border: none;

    background:inherit;
    padding:20px;
    border-radius:20px;
    box-shadow:0 15px 40px rgba(0,0,0,.15);
    transition:.35s;
    
    
}

.row{
    gap: 25px;
}



.card:hover{
   transform: translateY(-8px) scale(1.03);
        box-shadow:0 15px 35px rgba(0,0,0,.25);
        
}

img{
    max-width:100%;
    border-radius:15px;
}

@media(max-width:768px){

.container{
    padding:20px;
}

h1{
    font-size:28px;
}

.question{
    padding:18px;
}

button{
    font-size:18px;
}

}

@media (max-width:768px){

.content{
    margin-left:0;
    width:100%;
    min-height:100vh;
    overflow-x:hidden;
    padding:15px;
}

body{
    overflow-x:hidden;
}

}

  </style>


  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.12.1/css/all.min.css">


</head>

<body>

  <input type="checkbox" id="check">
  <!--header area start-->
  <header>
    <label for="check">
     <i class="fas fa-bars" id="sidebar_btn"></i>
    </label>
    <div class="left_area">
      <h3>Online Quiz</h3>
    </div>
    <div class="right_area">
      <a href="/logout" class="logout_btn">Logout</a>
    </div>
  </header>
  <!--header area end-->
  <!--sidebar start-->
  <div class="sidebar">
    <center>

      <img src="{% static "image/admin.png" %}" class="profile_image" alt="">
      <h4>Admin</h4>

    </center>

    <a href="/admin-dashboard"><i class="fas fa-tachometer-alt"></i><span>Dashboard</span></a>
   
    <a href="/admin-student"><i class="fas fa-user-graduate"></i><span>Student</span></a>
    <a href="/admin-course"><i class="fas fa-book"></i><span>Courses</span></a>
    <a href="/admin-question"><i class="fas fa-question-circle"></i><span>Questions</span></a>
    


  </div>
  <!--sidebar end-->


  <!--content start-->
  <div class="content">
    
    {% block content %}

    {% endblock content %}


    <br><br><br>
    {% include "quiz/footer.html" %}
  </div>
  <!--content end-->
</body>

</html>
